<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS AI Image Classifier</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background: #f4f4f4;
        }

        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        button {
            padding: 10px 20px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 20px;
        }

        img {
            width: 300px;
            margin-top: 20px;
            border-radius: 10px;
        }

        #status {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>AWS AI Image Classifier</h2>

        <input type="file" id="imageInput">

        <br>

        <button onclick="uploadImage()">Upload Image</button>

        <br>

        <img id="preview" src="" alt="">

        <div id="status"></div>

    </div>

    <script>

        async function uploadImage() {

            const file = document.getElementById('imageInput').files[0];

            if (!file) {
                alert("Please select image");
                return;
            }

            document.getElementById('status').innerHTML = "Uploading image...";

            const reader = new FileReader();

            reader.onload = async function () {

                const base64Image = reader.result.split(',')[1];

                try {

                    const response = await fetch('https://4yflm1b46m.execute-api.ap-south-1.amazonaws.com/upload', {

                        method: 'POST',

                        headers: {
                            'Content-Type': 'application/json'
                        },

                        body: JSON.stringify({
                            image: base64Image
                        })

                    });

                    const data = await response.json();

                    document.getElementById('preview').src = reader.result;

                    document.getElementById('status').innerHTML =
                        "Image Uploaded Successfully<br><br>Image ID: " + data.image_id;

                }

                catch (error) {

                    console.log(error);

                    document.getElementById('status').innerHTML =
                        "Upload Failed";

                }

            }

            reader.readAsDataURL(file);

        }

    </script>

</body>

</html>
